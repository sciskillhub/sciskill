name: Collect valid SKILL repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: collect-skills-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sciskill repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.SKILL_COLLECTOR_TOKEN }}
          MAX_REPOS: "100"
        run: |
          python scripts/collect_skills.py \
            --sciskill-root . \
            --query 'archived:false is:public' \
            --domain-topics-file config/domain_topics.txt \
            --qualifier-topics-file config/qualifier_topics.txt \
            --max-repos "$MAX_REPOS" \
            --report skill_report.json \
            --error-report skill_errors.json

      - name: Commit changes
        run: |
          python scripts/repair_skill_manifest.py --repo-root .
          if [ -f .gitmodules ]; then
            git add .gitmodules
          fi
          git add skill-manifest.json skill_report.json skill_errors.json open-source/
          git add -A config
          git diff --cached --quiet && exit 0
          git commit -m "chore: collect valid skill repos"
          git fetch origin main
          if ! git rebase origin/main; then
            echo "Rebase reported conflicts; attempting automatic skill-manifest repair"
            python scripts/repair_skill_manifest.py --repo-root .
            if [ -f .gitmodules ]; then
              git add .gitmodules
            fi
            git add skill-manifest.json open-source/
            GIT_EDITOR=true git rebase --continue
          fi
          git push origin HEAD:main
